name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup DDEV
        uses: ddev/github-action-setup-ddev@v1

      - name: Install Composer dependencies
        run: ddev composer install

      - name: Install Drupal
        run: ddev drush site:install standard --yes --site-name="Drupal Blueprint"

      - name: Smoke test the front page
        run: test "$(ddev exec drush status --field=bootstrap)" = "Successful"
